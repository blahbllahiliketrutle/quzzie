<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Home</title>

<style>
:root {
    --background: #DADADA;
    --primary: #0E2C6F;
    --secondary: #5F88C9;
    --text: #ffffff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--background);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.home-container {
    background: var(--primary);
    padding: 2.5rem;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 500px;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.3);
}


h1 {
    color: var(--text);
    margin-bottom: 20px;
}


.buttons {
    display: grid;
    gap: 15px;
}


button {
    padding: 14px;
    font-size: 1rem;
    border-radius: 10px;
    border: 2px solid var(--secondary);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s ease;
}


button:hover {
    background: var(--secondary);
    transform: scale(1.05);
}


.about-btn {
    margin-top: 15px;
    border-color: var(--text);
}

.about-btn:hover {
    background: var(--text);
    color: var(--primary);
}
</style>
</head>

<body>

<div class="home-container">
    <h1>Welkom bij de Quiz 🎯</h1>

    <div class="buttons">
        <button onclick="location.href='/gijs/index.html'">Quiz 1</button>
        <button onclick="location.href='/bray/index.html'">Quiz 2</button>
        <button onclick="location.href='/jay/index.html'">Quiz 3</button>
    </div>

    <button class="about-btn" onclick="location.href='onz.html'">
        Over ons
    </button>
</div>

</body>
</html>
