        <a href="/home.html">

        <h1>Welkom bij QUIZZIE</h1>
        <p>Thema: Bevolking & Samenleving</p>
        <input type="text" id="username" placeholder="Vul je naam in" style="padding: 10px; margin-bottom: 20px; width: 80%;"><br>

    </div>

    <div id="quiz-screen" style="display:none;">

    </div>

    </div>
